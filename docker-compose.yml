services:
  msa-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: msa-manager
    restart: always
    environment:
      CARBOSYS_ROOT: ../../projects/carbonet
      MSA_SSH_EDIT_TOKEN: ${MSA_SSH_EDIT_TOKEN:-}
      MSA_MANAGER_PORT: ${MSA_MANAGER_PORT:-18030}
      MSA_MANAGER_PORT_RANGE: ${MSA_MANAGER_PORT_RANGE:-18030-18030}
      MSA_AUTO_BUILD_ON_START: ${MSA_AUTO_BUILD_ON_START:-true}
    ports:
      - "18030:18030"
    volumes:
      - "../projects/carbonet:/opt/projects/carbonet"
      - "./EgovMsaManager:/opt/util/msaManager/EgovMsaManager"
      - "./logs:/opt/util/msaManager/logs"
      - "${HOME}/.m2:/root/.m2"
