server:
  port: 18030

spring:
  application:
    name: EgovMsaManager
  thymeleaf:
    encoding: UTF-8
    mode: HTML
    cache: false

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health, info, logfile
